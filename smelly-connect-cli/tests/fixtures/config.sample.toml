[vpn]
server = "vpn1.sit.edu.cn"
default_keepalive_host = "jwxt.sit.edu.cn"

[pool]
prewarm = 2
connect_timeout_secs = 20
session_connect_timeout_secs = 7
healthcheck_interval_secs = 60
selection = "round_robin"
failure_threshold = 3
backoff_base_secs = 30
backoff_max_secs = 600
allow_request_triggered_probe = true

[proxy]
upstream_tcp_connect_timeout_secs = 3

[[accounts]]
name = "acct-01"
username = "user1"
password = "pass1"

[[accounts]]
name = "acct-02"
username = "user2"
password = "pass2"

[proxy.http]
enabled = true
listen = "127.0.0.1:8080"

[proxy.socks5]
enabled = true
listen = "127.0.0.1:1080"
udp_associate_idle_timeout_secs = 90

[routing]
allow_all = false

[[routing.domain_rules]]
domain = "*.foo.edu.cn"
port_min = 443
port_max = 443
protocol = "tcp"

[[routing.ip_rules]]
ip_min = "42.62.107.1"
ip_max = "42.62.107.254"
port_min = 1
port_max = 65535
protocol = "all"

[management]
enabled = false
listen = "127.0.0.1:9090"

[logging]
mode = "stdout"
level = "info"
file = "smelly-connect.log"
